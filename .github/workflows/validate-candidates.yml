name: validate-candidates

on:
  pull_request:
    paths:
      - "kotoba/candidates.edn"
      - "kotoba/validate_candidates.bb"
  push:
    branches: [main]
    paths:
      - "kotoba/candidates.edn"
      - "kotoba/validate_candidates.bb"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install babashka
        run: curl -sLO https://raw.githubusercontent.com/babashka/babashka/master/install && chmod +x install && sudo ./install
      - run: bb kotoba/validate_candidates.bb kotoba/candidates.edn
